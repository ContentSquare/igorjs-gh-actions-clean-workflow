# Build a Shields.io endpoint JSON from the coverage summary produced by
# the CI workflow's unit-tests job, then publish it to gh-pages under
# badges/coverage.json. Triggered by workflow_run on CI success against
# main, so it reuses the test run from CI rather than running tests
# again. Replaces the previous Codecov integration; coverage thresholds
# are still enforced by vitest.config.ts.
name: Coverage Badge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  actions: read

concurrency:
  group: coverage-badge
  cancel-in-progress: true

jobs:
  badge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage artifact from CI
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-summary
          path: coverage/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build badge JSON
        run: |
          mkdir -p _badges
          PCT=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
          PCT_INT=${PCT%.*}
          if   [ "$PCT_INT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT_INT" -ge 80 ]; then COLOR=green
          elif [ "$PCT_INT" -ge 70 ]; then COLOR=yellowgreen
          elif [ "$PCT_INT" -ge 60 ]; then COLOR=yellow
          elif [ "$PCT_INT" -ge 50 ]; then COLOR=orange
          else                              COLOR=red
          fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" \
            > _badges/coverage.json
          cat _badges/coverage.json

      - name: Publish badge to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_badges
          destination_dir: badges
          keep_files: true
          commit_message: "chore: update coverage badge"
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
